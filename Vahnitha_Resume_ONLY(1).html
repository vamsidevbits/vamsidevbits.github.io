<style>

  <div class="steps">

      <div class="step-text">Tap the <strong>Share button</strong> (box with arrow ↑) at the bottom of Safari</div>

<!-- Desktop print button -->
<button class="desktop-btn" onclick="window.print()">🖨️ Print / Save PDF</button>

<div class="page" id="resume"></div>

<script>
function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}

function render() {
  const R = RESUME;
  const C = R.contact;
  document.title = `${R.name} — Resume`;

  const eduHTML = R.sidebar.education.map(e =>
    `<strong>${e.degree}</strong>${e.school ? `<br>${e.school}${e.year ? ` · ${e.year}` : ''}` : ''}`
  ).join('<br><br>');

  const sidebar = `
    <div class="sidebar"><div class="sidebar-inner">
      <div class="avatar-ring">${initials(R.name)}</div>
      <div class="sb-section">
        <div class="sb-label">Location</div>
        <div class="sb-text"><strong>${R.sidebar.location.city}</strong><br>${R.sidebar.location.country}</div>
      </div>
      <div class="sb-section">
        <div class="sb-label">Target Roles</div>
        <div class="sb-text">${R.sidebar.targetRoles.join('<br>')}</div>
      </div>
      <div class="sb-section">
        <div class="sb-label">Technical Skills</div>
        <div>${R.sidebar.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>
      </div>
      <div class="sb-section">
        <div class="sb-label">Certifications</div>
        ${R.sidebar.certifications.map(c => `<div class="cert-item"><div class="cert-dot"></div><div class="sb-text">${c}</div></div>`).join('')}
      </div>
      <div class="sb-section">
        <div class="sb-label">Education</div>
        <div class="sb-text">${eduHTML}</div>
      </div>
      <div class="sb-section">
        <div class="sb-label">Availability</div>
        <div class="sb-text">${R.sidebar.availability.replace('\n','<br>')}</div>
      </div>
    </div></div>`;

  const contactItems = [
    { icon:'📍', text: C.location },
    { icon:'✉️', text: C.email },
    { icon:'📱', text: C.phone },
    { icon:'🔗', text: C.linkedin }
  ];

  const experienceHTML = R.experience.map(job => `
    <div class="job">
      <div class="job-header">
        <div class="job-title">${job.title}</div>
        <div class="job-dates">${job.dates}</div>
      </div>
      <div class="job-company">${job.company} <span class="job-loc">· ${job.location}</span></div>
      <ul class="bullets">${job.bullets.map(b => `<li>${b}</li>`).join('')}</ul>
    </div>`).join('');

  const internshipsHTML = R.internships.map(i => `
    <div class="intern-title">${i.title}</div>
    <ul class="bullets">${i.bullets.map(b => `<li>${b}</li>`).join('')}</ul>`).join('');

  const main = `
    <div class="main">
      <div class="header-bar">
        <div class="name">${R.name}</div>
        <div class="title-line">${R.tagline}</div>
        <div class="contact-row">
          ${contactItems.map(ci => `<span class="contact-item">${ci.icon} ${ci.text}</span>`).join('')}
        </div>
      </div>
      <div class="main-content">
        <div class="section">
          <div class="sec-header"><div class="sec-title">Professional Summary</div><div class="sec-line"></div></div>
          <p class="summary-text">${R.summary}</p>
        </div>
        <div class="section">
          <div class="sec-header"><div class="sec-title">Core Competencies</div><div class="sec-line"></div></div>
          <div class="competencies">${R.competencies.map(c => `<div class="comp-item">${c}</div>`).join('')}</div>
        </div>
        <div class="section">
          <div class="sec-header"><div class="sec-title">Professional Experience</div><div class="sec-line"></div></div>
          ${experienceHTML}${internshipsHTML}
        </div>
      </div>
    </div>`;

  document.getElementById('resume').innerHTML = `<div class="layout">${sidebar}${main}</div>`;
}

render();
</script>
</body>
