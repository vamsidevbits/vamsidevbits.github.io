name: Generate PDF Resume

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Puppeteer
      run: npm install puppeteer
      
    - name: Generate Resume PDF
      run: |
        node -e "
        const puppeteer = require('puppeteer');
        (async () => {
          const browser = await puppeteer.launch({
            headless: 'new',
            args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
          });
          const page = await browser.newPage();
          await page.goto('file://' + process.cwd() + '/index.html', {
            waitUntil: 'networkidle0'
          });
          await page.pdf({
            path: 'Vahnitha_Kanuri_Resume.pdf',
            format: 'A4',
            printBackground: true,
            margin: { top: 0, right: 0, bottom: 0, left: 0 }
          });
          await browser.close();
        })();
        "
        
    - name: Generate Cover Letter PDF
      run: |
        node -e "
        const puppeteer = require('puppeteer');
        (async () => {
          const browser = await puppeteer.launch({
            headless: 'new',
            args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
          });
          const page = await browser.newPage();
          await page.goto('file://' + process.cwd() + '/index.html', {
            waitUntil: 'networkidle0'
          });
          // Click the Cover Letter tab by finding button with text
          await page.evaluate(() => {
            const buttons = Array.from(document.querySelectorAll('.tab'));
            const coverLetterBtn = buttons.find(btn => btn.textContent.includes('Cover Letter'));
            if (coverLetterBtn) coverLetterBtn.click();
          });
          await page.waitForTimeout(500);
          await page.pdf({
            path: 'Vahnitha_Kanuri_CoverLetter.pdf',
            format: 'A4',
            printBackground: true,
            margin: { top: 0, right: 0, bottom: 0, left: 0 }
          });
          await browser.close();
        })();
        "
        
    - name: Commit PDFs
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add *.pdf
        git diff --staged --quiet || git commit -m "Auto-generate PDFs [skip ci]"
        git push
